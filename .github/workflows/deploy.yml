name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject deploy secrets (크론 키만 — API 키는 FTP _site.config.local.php 수동 관리)
        env:
          TALKROOM_MAINTENANCE_KEY: ${{ secrets.TALKROOM_MAINTENANCE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p _deploy_secrets/data
          echo "HAS_DEPLOY_SECRETS=0" >> "$GITHUB_ENV"
          echo "HAS_MAINTENANCE_KEY=0" >> "$GITHUB_ENV"
          MAINT_KEY="${TALKROOM_MAINTENANCE_KEY:-$OPENAI_API_KEY}"
          if [ -n "$MAINT_KEY" ]; then
            export MAINT_KEY
            php -r '
              $key = getenv("MAINT_KEY");
              file_put_contents(
                  "_deploy_secrets/data/eottae-maintenance.local.php",
                  "<?php\nif (!defined(\"_GNUBOARD_\")) exit;\n"
                  . "define(\"EOTTAE_MAINTENANCE_BATCH_KEY\", ".var_export($key, true)." );\n"
              );
            '
            echo "HAS_MAINTENANCE_KEY=1" >> "$GITHUB_ENV"
          fi
          if [ -f _deploy_secrets/data/eottae-maintenance.local.php ]; then
            echo "HAS_DEPLOY_SECRETS=1" >> "$GITHUB_ENV"
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          parallel: 1
          protocol: ftp
          local-dir: ./
          server-dir: /public_html/
          state-name: thecebu-deploy-v1
          log-level: minimal
          exclude: |
            **/.git*
            **/.github/**
            **/.DS_Store
            **/.vscode/**
            _BUILDER_INPUT/**
            _deploy_secrets/**
            data/**
            cache/**
            session/**
            tmp/**
            *.log
            .env
            .env.*
            data/dbconfig.local.php
            _site.config.local.php

      - name: Deploy secrets via FTP (data/ only)
        if: env.HAS_DEPLOY_SECRETS == '1'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          parallel: 1
          protocol: ftp
          local-dir: ./_deploy_secrets/
          server-dir: /public_html/
          state-name: thecebu-secrets-v1
          log-level: minimal
          exclude: |
            _site.config.local.php
            **/_site.config.local.php

      - name: Approve pending talkroom applications
        if: env.HAS_MAINTENANCE_KEY == '1'
        env:
          TALKROOM_MAINTENANCE_KEY: ${{ secrets.TALKROOM_MAINTENANCE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          MAINT_KEY="${TALKROOM_MAINTENANCE_KEY:-$OPENAI_API_KEY}"
          curl -sfS --max-time 60 \
            "https://thecebu.co.kr/proc/eottae-talkroom-maintenance.php?action=approve_pending_rooms&key=${MAINT_KEY}"
