name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject Google Maps API key
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -n "${GOOGLE_MAPS_API_KEY}" ]; then
            php -r 'file_put_contents("_site.config.local.php", "<?php\nif (!defined(\"_GNUBOARD_\")) exit;\n\$site_config_override = array(\n    \"google_maps_api_key\" => ".var_export(getenv("GOOGLE_MAPS_API_KEY"), true).",\n);\n");'
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          parallel: 1
          protocol: ftp
          local-dir: ./
          server-dir: /public_html/
          state-name: thecebu-deploy-v1
          log-level: minimal
          exclude: |
            **/.git*
            **/.github/**
            **/.DS_Store
            **/.vscode/**
            _BUILDER_INPUT/**
            data/**
            cache/**
            session/**
            tmp/**
            *.log
            .env
            .env.*
