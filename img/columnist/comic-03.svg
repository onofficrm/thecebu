<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" role="img" aria-label="Invitation to become a Cebu Eottae columnist">
  <defs>
    <linearGradient id="c03bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafaf9"/>
      <stop offset=".5" stop-color="#f5f4f0"/>
      <stop offset="1" stop-color="#e6f0ef"/>
    </linearGradient>
    <linearGradient id="c03logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0f4c5c"/>
    </linearGradient>
    <filter id="c03sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1c1917" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="640" height="480" fill="url(#c03bg)"/>
  <circle cx="96" cy="380" r="120" fill="#d6ebe8" opacity=".45"/>
  <circle cx="560" cy="96" r="88" fill="#fef3c7" opacity=".8"/>
  <!-- phone / app screen -->
  <g transform="translate(148 64)" filter="url(#c03sh)">
    <rect x="0" y="0" width="344" height="352" rx="36" fill="#1c1917"/>
    <rect x="16" y="20" width="312" height="312" rx="28" fill="#fff"/>
    <rect x="36" y="44" width="272" height="56" rx="16" fill="#f5f4f0"/>
    <!-- logo mark -->
    <g transform="translate(52 52)">
      <circle cx="28" cy="28" r="28" fill="url(#c03logo)"/>
      <path d="M18 52c4-22 12-36 22-44 2 14 8 24 16 32-6-18-5-32 4-44 10 16 16 32 17 56H18z" fill="#0f4c5c" opacity=".35"/>
      <path d="M28 56V30c0-8 5-14 12-17" stroke="#0f4c5c" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="118" y="78" font-family="Source Sans 3, sans-serif" font-size="22" font-weight="800" fill="#0f4c5c">세부어때</text>
    <text x="118" y="98" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="600" fill="#78716c">Columnist</text>
    <rect x="36" y="120" width="272" height="14" rx="7" fill="#e7e5e4"/>
    <rect x="36" y="148" width="220" height="12" rx="6" fill="#e7e5e4"/>
    <rect x="36" y="176" width="248" height="12" rx="6" fill="#e7e5e4"/>
    <rect x="36" y="220" width="272" height="72" rx="18" fill="#0f4c5c"/>
    <text x="172" y="258" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="18" font-weight="700" fill="#fef3c7">Apply now</text>
    <path d="M56 268l16 12 28-34" fill="none" stroke="#fef3c7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity=".5"/>
  </g>
  <!-- welcoming character -->
  <g transform="translate(44 200)" filter="url(#c03sh)">
    <circle cx="56" cy="56" r="56" fill="#d6ebe8"/>
    <circle cx="56" cy="48" r="28" fill="#f5d0a8"/>
    <path d="M32 48c0-16 10-28 24-28s24 12 24 28" fill="#0f4c5c"/>
    <path d="M20 112c8-28 22-40 36-40s28 12 36 40" fill="#0f4c5c"/>
    <path d="M88 72l36-20 12 28-48-8z" fill="#fef3c7" stroke="#b45309" stroke-width="4" stroke-linejoin="round"/>
  </g>
  <!-- reader character -->
  <g transform="translate(500 220)" filter="url(#c03sh)">
    <circle cx="48" cy="48" r="48" fill="#fef3c7"/>
    <circle cx="48" cy="40" r="22" fill="#f5d0a8"/>
    <path d="M30 40c0-12 8-20 18-20s18 8 18 20" fill="#b45309" opacity=".75"/>
    <path d="M18 96c6-22 18-32 30-32s24 10 30 32" fill="#b45309"/>
    <rect x="8" y="108" width="80" height="48" rx="12" fill="#fff" stroke="#e7e5e4" stroke-width="2"/>
    <path d="M20 128h56M20 142h40" stroke="#0f4c5c" stroke-width="6" stroke-linecap="round" opacity=".25"/>
  </g>
  <!-- speech -->
  <g transform="translate(420 48)" filter="url(#c03sh)">
    <rect x="0" y="0" width="168" height="72" rx="20" fill="#0f4c5c"/>
    <path d="M24 72l-8 24 32-24z" fill="#0f4c5c"/>
    <text x="84" y="32" text-anchor="middle" font-family="Noto Serif KR, serif" font-size="14" font-weight="700" fill="#fef3c7">Your story</text>
    <text x="84" y="54" text-anchor="middle" font-family="Noto Serif KR, serif" font-size="14" font-weight="700" fill="#fef3c7">helps others</text>
  </g>
</svg>
