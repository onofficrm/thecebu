<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Cebu Eottae columnist recruitment hero illustration">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafaf9"/>
      <stop offset=".45" stop-color="#f5f4f0"/>
      <stop offset="1" stop-color="#e6f0ef"/>
    </linearGradient>
    <linearGradient id="heroLogo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0f4c5c"/>
    </linearGradient>
    <filter id="heroSh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#1c1917" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#heroBg)"/>
  <circle cx="680" cy="100" r="120" fill="#fef3c7" opacity=".75"/>
  <circle cx="100" cy="520" r="140" fill="#d6ebe8" opacity=".5"/>
  <path d="M0 440c120-40 220-20 320-56 100-36 180-100 300-72 108 26 160 72 180 48v240H0z" fill="#d6ebe8" opacity=".65"/>
  <!-- simplified map card -->
  <g transform="translate(88 120)" filter="url(#heroSh)">
    <rect x="0" y="0" width="280" height="360" rx="32" fill="#fff"/>
    <rect x="24" y="24" width="232" height="160" rx="20" fill="#e6f0ef"/>
    <path d="M48 148c40-28 88-44 132-44 52 0 96 20 132 56" fill="none" stroke="#0f4c5c" stroke-width="8" stroke-linecap="round" opacity=".25"/>
    <circle cx="120" cy="108" r="14" fill="#0f4c5c"/>
    <circle cx="180" cy="132" r="10" fill="#b45309"/>
    <circle cx="148" cy="156" r="8" fill="#0f4c5c" opacity=".5"/>
    <rect x="24" y="204" width="180" height="12" rx="6" fill="#d6d3d1"/>
    <rect x="24" y="228" width="140" height="10" rx="5" fill="#e7e5e4"/>
    <rect x="24" y="252" width="200" height="10" rx="5" fill="#e7e5e4"/>
    <rect x="24" y="292" width="232" height="48" rx="14" fill="#0f4c5c"/>
    <text x="140" y="322" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="16" font-weight="700" fill="#fef3c7">Share Cebu tips</text>
  </g>
  <!-- writers group -->
  <g transform="translate(400 96)" filter="url(#heroSh)">
    <rect x="0" y="0" width="312" height="400" rx="32" fill="#fff"/>
    <g transform="translate(48 48)">
      <circle cx="48" cy="48" r="48" fill="#fef3c7"/>
      <circle cx="48" cy="40" r="22" fill="#f5d0a8"/>
      <path d="M30 40c0-12 8-20 18-20s18 8 18 20" fill="#b45309" opacity=".8"/>
      <path d="M14 96c8-26 20-36 34-36s26 10 34 36" fill="#b45309"/>
    </g>
    <g transform="translate(132 72)">
      <circle cx="56" cy="56" r="56" fill="#d6ebe8"/>
      <circle cx="56" cy="46" r="26" fill="#f5d0a8"/>
      <path d="M36 46c0-14 10-24 20-24s20 10 20 24" fill="#0f4c5c"/>
      <path d="M16 112c10-32 26-44 40-44s30 12 40 44" fill="#0f4c5c"/>
      <rect x="0" y="128" width="112" height="56" rx="14" fill="#f5f4f0"/>
      <path d="M20 150h72M20 168h48" stroke="#0f4c5c" stroke-width="6" stroke-linecap="round" opacity=".25"/>
    </g>
    <g transform="translate(200 200)">
      <circle cx="36" cy="36" r="36" fill="#f1eadb"/>
      <circle cx="36" cy="30" r="16" fill="#f5d0a8"/>
      <path d="M24 30c0-9 5-15 12-15s12 6 12 15" fill="#44403c"/>
      <path d="M12 72c6-20 16-28 24-28s18 8 24 28" fill="#44403c"/>
    </g>
    <!-- logo -->
    <g transform="translate(108 300)">
      <circle cx="48" cy="48" r="48" fill="url(#heroLogo)"/>
      <path d="M30 78c5-28 16-46 30-56 3 18 10 32 20 44-8-24-6-42 6-56 14 20 22 40 24 68H30z" fill="#0f4c5c" opacity=".3"/>
      <path d="M48 82V48c0-10 7-18 16-22" stroke="#0f4c5c" stroke-width="4" stroke-linecap="round"/>
      <text x="120" y="42" font-family="Source Sans 3, sans-serif" font-size="28" font-weight="800" fill="#0f4c5c">세부어때</text>
      <text x="120" y="68" font-family="Noto Serif KR, serif" font-size="16" font-weight="700" fill="#78716c">Columnist</text>
    </g>
    <!-- speech bubbles -->
    <ellipse cx="260" cy="56" rx="36" ry="24" fill="#0f4c5c" opacity=".12"/>
    <ellipse cx="40" cy="280" rx="28" ry="18" fill="#b45309" opacity=".15"/>
  </g>
  <!-- pen / write accent -->
  <g transform="translate(620 360)" filter="url(#heroSh)">
    <rect width="96" height="96" rx="24" fill="#fef3c7"/>
    <path d="M32 64l32-40 16 16-32 40-16-16z" fill="#0f4c5c"/>
    <path d="M56 24l8 8-12 12-8-8z" fill="#b45309"/>
  </g>
</svg>
