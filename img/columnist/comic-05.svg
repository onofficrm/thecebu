<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" role="img" aria-label="Columnist grows visibility and promotes expertise">
  <defs>
    <linearGradient id="c05bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafaf9"/>
      <stop offset=".5" stop-color="#f5f4f0"/>
      <stop offset="1" stop-color="#e6f0ef"/>
    </linearGradient>
    <linearGradient id="c05rise" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0f4c5c" stop-opacity="0"/>
      <stop offset="1" stop-color="#0f4c5c" stop-opacity=".15"/>
    </linearGradient>
    <filter id="c05sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1c1917" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="640" height="480" fill="url(#c05bg)"/>
  <rect x="0" y="280" width="640" height="200" fill="url(#c05rise)"/>
  <circle cx="544" cy="88" r="76" fill="#fef3c7" opacity=".8"/>
  <!-- rising arrow -->
  <path d="M120 360 L120 140 L96 164 L120 120 L144 164 L120 140" fill="none" stroke="#b45309" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity=".45"/>
  <path d="M120 360v-200" stroke="#0f4c5c" stroke-width="14" stroke-linecap="round" opacity=".2"/>
  <!-- profile card -->
  <g transform="translate(168 72)" filter="url(#c05sh)">
    <rect x="0" y="0" width="304" height="340" rx="28" fill="#fff"/>
    <rect x="0" y="0" width="304" height="96" rx="28" fill="#0f4c5c"/>
    <rect x="0" y="68" width="304" height="28" fill="#0f4c5c"/>
    <circle cx="152" cy="96" r="56" fill="#d6ebe8" stroke="#fff" stroke-width="6"/>
    <circle cx="152" cy="88" r="26" fill="#f5d0a8"/>
    <path d="M130 88c0-14 10-24 22-24s22 10 22 24" fill="#0f4c5c"/>
    <rect x="48" y="168" width="208" height="14" rx="7" fill="#1c1917" opacity=".85"/>
    <rect x="72" y="196" width="160" height="10" rx="5" fill="#d6d3d1"/>
    <rect x="48" y="228" width="96" height="32" rx="16" fill="#fef3c7"/>
    <text x="96" y="250" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="700" fill="#b45309">Expert</text>
    <rect x="160" y="228" width="96" height="32" rx="16" fill="#d6ebe8"/>
    <text x="208" y="250" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="700" fill="#0f4c5c">Cebu</text>
    <rect x="48" y="280" width="208" height="40" rx="12" fill="#0f4c5c" opacity=".08"/>
    <text x="152" y="306" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="600" fill="#0f4c5c">Views growing</text>
  </g>
  <!-- stars / promotion -->
  <g transform="translate(488 148)" filter="url(#c05sh)">
    <circle cx="40" cy="40" r="40" fill="#b45309"/>
    <path d="M40 18l6 14 15 2-11 10 3 15-13-8-13 8 3-15-11-10 15-2z" fill="#fef3c7"/>
  </g>
  <g transform="translate(52 180)" filter="url(#c05sh)">
    <rect x="0" y="0" width="88" height="88" rx="22" fill="#fff" stroke="#e7e5e4" stroke-width="2"/>
    <path d="M24 56h40M24 40h28M24 24h48" stroke="#0f4c5c" stroke-width="6" stroke-linecap="round" opacity=".3"/>
    <circle cx="64" cy="24" r="12" fill="#22c55e"/>
    <text x="44" y="76" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="11" font-weight="700" fill="#78716c">Biz promo</text>
  </g>
  <!-- character cheering -->
  <g transform="translate(488 300)">
    <circle cx="36" cy="36" r="36" fill="#f5d0a8"/>
    <path d="M18 36c0-12 8-20 18-20s18 8 18 20" fill="#0f4c5c"/>
