  <!-- big question -->
  <g transform="translate(248 24)" filter="url(#c02sh)">
    <circle cx="72" cy="72" r="72" fill="#0f4c5c"/>
    <text x="72" y="98" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="72" font-weight="800" fill="#fef3c7">?</text>
