      <path d="M38 64l22-42 20 42M48 50h32" stroke="#b45309" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="82" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="700" fill="#b45309">Home</text>
    </g>
    <g transform="translate(72 268) rotate(-5 60 50)">
      <rect width="120" height="100" rx="18" fill="#fff" stroke="#e7e5e4" stroke-width="3"/>
      <rect x="22" y="24" width="76" height="10" rx="5" fill="#d6d3d1"/>
      <rect x="22" y="44" width="56" height="8" rx="4" fill="#d6d3d1"/>
      <rect x="22" y="60" width="64" height="8" rx="4" fill="#d6d3d1"/>
      <text x="60" y="86" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="12" font-weight="600" fill="#78716c">Memo</text>
    </g>
  </g>
  <!-- desk + character -->
  <g transform="translate(168 118)" filter="url(#c02sh)">
    <rect x="0" y="168" width="304" height="22" rx="11" fill="#0f4c5c" opacity=".12"/>
    <rect x="24" y="120" width="256" height="68" rx="16" fill="#fff"/>
    <rect x="48" y="142" width="208" height="12" rx="6" fill="#e7e5e4"/>
    <circle cx="152" cy="52" r="46" fill="#f5d0a8"/>
    <path d="M108 52c0-26 18-46 44-46s44 20 44 46" fill="#44403c"/>
    <circle cx="136" cy="48" r="5" fill="#1c1917"/>
    <circle cx="168" cy="48" r="5" fill="#1c1917"/>
    <path d="M140 72c6-6 18-6 24 0" fill="none" stroke="#78716c" stroke-width="4" stroke-linecap="round"/>
    <path d="M108 188c12-40 30-60 44-60s32 20 44 60" fill="#0f4c5c"/>
    <path d="M88 150l-20 18M216 150l20 18" stroke="#0f4c5c" stroke-width="10" stroke-linecap="round"/>
