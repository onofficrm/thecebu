  <g filter="url(#c02sh)">
    <g transform="translate(56 72) rotate(-8 60 50)">
      <rect width="120" height="100" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="3"/>
      <circle cx="60" cy="38" r="20" fill="#b45309" opacity=".2"/>
      <path d="M48 58h24M44 38c4-12 12-18 16-18s12 6 16 18" fill="none" stroke="#b45309" stroke-width="5" stroke-linecap="round"/>
      <text x="60" y="82" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="700" fill="#b45309">Food</text>
    </g>
    <g transform="translate(468 88) rotate(10 60 50)">
      <rect width="120" height="100" rx="18" fill="#f0f9ff" stroke="#bae6fd" stroke-width="3"/>
      <path d="M42 62h36M60 28v48M48 40h24" stroke="#0f4c5c" stroke-width="5" stroke-linecap="round"/>
      <text x="60" y="82" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="700" fill="#0f4c5c">Clinic</text>
    </g>
    <g transform="translate(498 248) rotate(6 60 50)">
