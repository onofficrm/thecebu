<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" role="img" aria-label="Person overwhelmed by scattered Cebu life tips">
  <defs>
    <linearGradient id="c02bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafaf9"/>
      <stop offset=".5" stop-color="#f5f4f0"/>
      <stop offset="1" stop-color="#e9f1ef"/>
    </linearGradient>
    <filter id="c02sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1c1917" flood-opacity=".13"/>
    </filter>
  </defs>
  <rect width="640" height="480" fill="url(#c02bg)"/>
  <circle cx="520" cy="72" r="70" fill="#fef3c7" opacity=".75"/>
  <path d="M0 350c80-28 150-14 220-40 90-30 150-76 250-54 88 20 130 52 170 28v196H0z" fill="#d6ebe8" opacity=".7"/>
